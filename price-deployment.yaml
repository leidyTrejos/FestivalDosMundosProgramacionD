apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-api-deployment
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: price-api
  template:
    metadata:
      labels:
        app: price-api
    spec:
      containers:
      - name: price-api
        image: danielvillamizara/itm-price-api:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: "Development"
        resources:
          requests:
            cpu: 100m
        livenessProbe:
          httpGet:
            path: /api/price/metrics
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: price-api-service
  namespace: default
spec:
  selector:
    app: price-api
  ports:
  - protocol: TCP
    port: 80
    targetPort: 8080
  type: ClusterIP
