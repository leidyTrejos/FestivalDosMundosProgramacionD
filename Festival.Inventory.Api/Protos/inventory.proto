syntax = "proto3";

option csharp_namespace = "Festival.Inventory.Api.Protos";

package Inventory;

service InventoryService {
	rpc CheckStock(StockRequest) returns (StockResponse);
}

message StockRequest {
	int32 product_id = 1;
}

message StockResponse {
	int32 product_id = 1;
	int32 stock = 2;
	bool is_available = 3;
}
